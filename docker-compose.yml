services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      GUILD_ID: ${GUILD_ID:-}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS}
      DATABASE_PATH: /data/challenge.db
    volumes:
      - challenge-data:/data

volumes:
  challenge-data:
